<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBEE Eyewear - Cửa Hàng Kính Mắt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="logo">TBEE <span>Eyewear</span></div>
    <nav class="nav">
        <a href="#">Trang chủ</a>
        <a href="#">Kính Mát</a>
        <a href="#">Gọng Kính</a>
        <a href="#">Tròng Kính</a>
    </nav>
</header>

<main class="container">
    <div class="section-header">
        <h1 class="section-title">Danh Sách Kính Mắt</h1>
    </div>

    <div class="product-grid" id="product-grid">

        <div class="product-card">
            <div class="product-image">
                <img src="placeholder-glass.jpg" alt="Kính Mẫu">
            </div>
            <div class="product-info">
                <h3 class="product-name">Kính Mát Bolon BX8005</h3>
                <p class="product-price">3.180.000 đ</p>
                <button class="btn-add-cart">Thêm Vào Giỏ</button>
            </div>
        </div>

    </div>
</main>
</body>
</html>
