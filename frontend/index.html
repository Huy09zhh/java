<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBEE Eyewear - Cửa Hàng Kính Mắt</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <div class="brand">TBEE <span>Eyewear</span></div>
            <nav class="site-nav" style="display: flex; align-items: center; gap: 24px;">
                <a href="#">Trang chủ</a>
                <a href="#">Kính Mát</a>
                <a href="#">Gọng Kính</a>
                <a href="#">Tròng Kính</a>
                <a href="#">Liên hệ</a>
                <div class="nav-controls" style="display: flex; align-items: center; gap: 15px;">
                    <button class="nav-btn" id="accountBtn" style="background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 0;">👤</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="container">
            <div class="section-header">
                <h1 class="section-title">Danh Sách Kính Mắt</h1>
            </div>

            <div class="product-grid" id="product-grid">
                <div class="product-card">
                    <div class="product-image">
                        <img src="placeholder-glass.jpg" alt="Kính Mẫu">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Kính Mát Bolon BX8005</h3>
                        <p class="product-price">3.180.000 đ</p>
                        <button class="btn-add-cart">Thêm Vào Giỏ</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 TBEE Eyewear. Bảo lưu mọi quyền.</p>
        </div>
    </footer>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-content glass">
            <span class="close-btn" id="closeLoginBtn">&times;</span>
            <h2 id="authTitle" style="margin-bottom: 20px;">Đăng Nhập</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" required>
                </div>
                <p id="loginError" style="color: var(--danger); margin-bottom: 15px; font-size: 0.9rem;"></p>
                <button type="submit" class="btn btn-primary" id="authSubmitBtn">Đăng Nhập</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
