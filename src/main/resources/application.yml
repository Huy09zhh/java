spring:
  application:
    name: eyewear-store
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=eyewear_db;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;
    username: your_username
    password: your_password
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        "[format_sql]": true

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

acb:
  username: your_acb_user
  password: your_acb_password
  account-number: your_acb_account